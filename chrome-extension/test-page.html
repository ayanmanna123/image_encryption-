<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encryption Extension Test Page</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            line-height: 1.6;
            background-color: #f4f4f9;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h1 { color: #4f46e5; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        .content-editable {
            min-height: 100px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            background: white;
        }
        #output {
            margin-top: 20px;
            padding: 10px;
            background: #eee;
            border-radius: 4px;
            font-family: monospace;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>Extension Test Page</h1>
    <p>Use this page to test the Secure Text Encryption extension.</p>

    <div class="card">
        <label for="standard-input">Standard Input Field:</label>
        <input type="text" id="standard-input" placeholder="Type something here...">
    </div>

    <div class="card">
        <label for="textarea-input">Textarea Field:</label>
        <textarea id="textarea-input" placeholder="Type a longer message..."></textarea>
    </div>

    <div class="card">
        <label>Content Editable Div (Common in Chat Apps):</label>
        <div class="content-editable" contenteditable="true" id="editable-div">Type here...</div>
    </div>

    <div class="card">
        <h2>Existing Encrypted Text</h2>
        <p>This should trigger the "Decrypt" button:</p>
        <p id="encrypted-sample">ENC::AUIB/w==:iv-placeholder:ciphertext-placeholder</p>
    </div>

    <script>
        // Simple log to see changes
        const inputs = [
            document.getElementById('standard-input'),
            document.getElementById('textarea-input'),
            document.getElementById('editable-div')
        ];

        inputs.forEach(input => {
            input.addEventListener('input', (e) => {
                console.log('Input changed:', e.target.value || e.target.innerText);
            });
        });
    </script>
</body>
</html>
